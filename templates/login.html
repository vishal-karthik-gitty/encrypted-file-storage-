<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Optional existing CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-gray-900 text-white">

<!-- 🔝 NAVBAR -->
<div class="flex justify-between items-center px-6 py-4 bg-gray-800 shadow-md">
    <h2 class="text-xl font-bold">🔐 Secure Cloud Storage</h2>

    <div class="space-x-6 text-sm">
        <a href="/dashboard" class="hover:text-blue-400">Home</a>
        <a href="/upload" class="hover:text-blue-400">Upload</a>
        <a href="/files" class="hover:text-blue-400">Files</a>
        <a href="/logout" class="hover:text-red-400">Logout</a>
    </div>
</div>

<!-- 🔔 TOAST -->
<div class="fixed top-5 right-5 space-y-2 z-50">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="toast bg-green-600 px-4 py-2 rounded shadow-lg">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>

<!-- 🔐 LOGIN CARD -->
<div class="flex items-center justify-center h-[80vh]">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-96">

        <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required
                class="w-full mb-4 p-2 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">

            <!-- Password -->
            <div class="relative mb-4">
                <input type="password" id="password" name="password" placeholder="Password" required
                    class="w-full p-2 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">

                <span onclick="togglePassword()"
                    class="absolute right-3 top-2 cursor-pointer text-gray-300 hover:text-white">
                    👁
                </span>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 p-2 rounded hover:bg-blue-700 transition">
                Login
            </button>
        </form>

        <p class="mt-4 text-center text-sm">
            New user?
            <a href="/register" class="text-blue-400 hover:underline">
                Create Account
            </a>
        </p>

    </div>

</div>

<!-- 🔐 PASSWORD TOGGLE -->
<script>
function togglePassword() {
    var pass = document.getElementById("password");

    pass.type = (pass.type === "password") ? "text" : "password";
}
</script>

<!-- 🔔 TOAST AUTO HIDE -->
<script>
setTimeout(() => {
    document.querySelectorAll('.toast').forEach(el => {
        el.style.opacity = "0";
        setTimeout(() => el.remove(), 500);2
    });
}, 3000);
</script>

</body>
</html>
