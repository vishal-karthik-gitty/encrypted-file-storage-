
<!DOCTYPE html>
<html>
<head>
    <title>Upload File</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Optional CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-gray-900 text-white">

<!-- 🔝 NAVBAR -->
<div class="flex justify-between items-center px-6 py-4 bg-gray-800 shadow-md">
    <h2 class="text-xl font-bold">🔐 Secure Cloud Storage</h2>

    <div class="space-x-6 text-sm">
        <a href="/dashboard" class="hover:text-blue-400">Home</a>
        <a href="/upload" class="text-blue-400 font-semibold">Upload</a>
        <a href="/files" class="hover:text-blue-400">Files</a>
        <a href="/logout" class="hover:text-red-400">Logout</a>
    </div>
</div>

<!-- 🔔 TOAST -->
<div class="fixed top-5 right-5 space-y-2 z-50">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="toast bg-green-600 px-4 py-2 rounded shadow-lg">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>

<!-- 📤 UPLOAD SECTION -->
<div class="flex items-center justify-center h-[80vh]">

    <div class="bg-gray-800 p-10 rounded-2xl shadow-lg w-[400px] text-center">

        <h2 class="text-2xl font-bold mb-6">Upload File</h2>

        <form method="POST" action="/upload" enctype="multipart/form-data">

            <!-- File Input -->
            <input type="file" name="file" required
                class="w-full mb-6 text-sm text-gray-300 file:mr-4 file:py-2 file:px-4 
                file:rounded file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700">

            <!-- Button -->
            <button type="submit"
                class="w-full bg-blue-600 p-2 rounded hover:bg-blue-700 transition">
                Upload
            </button>

        </form>

        <!-- Back -->
        <a href="/dashboard"
            class="block mt-4 text-sm text-blue-400 hover:underline">
            ← Back to Dashboard
        </a>

    </div>

</div>

<!-- 🔔 TOAST AUTO HIDE -->
<script>
setTimeout(() => {
    document.querySelectorAll('.toast').forEach(el => {
        el.style.opacity = "0";
        setTimeout(() => el.remove(), 500);
    });
}, 3000);
</script>

</body>
</html>
